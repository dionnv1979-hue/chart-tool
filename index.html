<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a1628">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Счётчик воды">
<title>Счётчик воды</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #060d1a;
    --surface: #0d1f35;
    --card: #0f2540;
    --border: #1a4060;
    --accent: #00c8ff;
    --accent2: #00ff9d;
    --warn: #ff6b35;
    --text: #e0f4ff;
    --muted: #4a7a9b;
    --glow: 0 0 20px rgba(0,200,255,0.3);
  }

  html, body {
    height: 100%; background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text); overflow: hidden;
    user-select: none;
  }

  /* ── CAMERA ── */
  #video {
    position: fixed; inset: 0; width: 100%; height: 100%;
    object-fit: cover; opacity: 0.35;
    transition: opacity 0.5s;
  }
  #video.hidden { opacity: 0; pointer-events: none; }

  /* ── OVERLAY ── */
  #app {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top, 12px) 16px env(safe-area-inset-bottom, 16px);
    gap: 10px;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0;
  }
  .topbar h1 {
    font-size: 18px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent);
    text-shadow: var(--glow);
  }
  .cam-btn {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 14px;
    font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600;
    color: var(--accent); cursor: pointer; letter-spacing: 1px;
    transition: all 0.2s;
  }
  .cam-btn:active { transform: scale(0.95); background: var(--border); }
  .cam-btn.on { color: var(--accent2); border-color: var(--accent2); }

  /* ── VIEWFINDER ── */
  .viewfinder {
    position: relative; flex: 0 0 auto;
    border-radius: 16px; overflow: hidden;
    border: 1.5px solid var(--border);
    background: rgba(10,30,55,0.6);
    height: 180px;
    display: flex; align-items: center; justify-content: center;
  }
  .vf-corners::before, .vf-corners::after {
    content: ''; position: absolute;
    width: 24px; height: 24px; border-color: var(--accent); border-style: solid;
  }
  .vf-corners::before { top: 10px; left: 10px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .vf-corners::after  { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }
  .crosshair {
    width: 60px; height: 60px; position: relative; opacity: 0.6;
  }
  .crosshair::before, .crosshair::after {
    content: ''; position: absolute; background: var(--accent);
    border-radius: 2px;
  }
  .crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  .crosshair::after  { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
  .cam-off-msg {
    font-size: 13px; color: var(--muted); letter-spacing: 1px; text-align: center;
    line-height: 1.8;
  }

  /* ── DIGITS DISPLAY ── */
  .digits-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .card {
    min-width: 0; background: rgba(13,31,53,0.85);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 12px 8px; backdrop-filter: blur(8px);
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .card-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted); text-align: center;
  }
  .card-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(18px, 5vw, 26px); color: var(--accent2);
    text-shadow: 0 0 16px rgba(0,255,157,0.4);
    line-height: 1; word-break: break-all; text-align: center;
  }
  .card-unit {
    font-size: 10px; color: var(--muted); letter-spacing: 1px;
  }
  .card.accent .card-value { color: var(--accent); text-shadow: 0 0 16px rgba(0,200,255,0.4); }
  .card.warn .card-value   { color: var(--warn); text-shadow: 0 0 16px rgba(255,107,53,0.4); }

  /* ── COUNTER CONTROLS ── */
  .counter-panel {
    background: rgba(13,31,53,0.85);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 16px; backdrop-filter: blur(8px);
    display: flex; flex-direction: column; gap: 14px;
  }
  .counter-title {
    font-size: 13px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted); text-align: center;
  }
  .counter-main {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .btn-circle {
    width: 64px; height: 64px; border-radius: 50%;
    border: 2px solid var(--border);
    background: rgba(0,200,255,0.08);
    font-size: 28px; font-weight: 300; color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-circle:active { transform: scale(0.88); background: rgba(0,200,255,0.2); }
  .btn-circle.minus { color: var(--warn); border-color: rgba(255,107,53,0.3); background: rgba(255,107,53,0.06); }
  .btn-circle.minus:active { background: rgba(255,107,53,0.2); }

  .rotations-display {
    flex: 1; text-align: center;
  }
  .rot-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 52px; color: var(--text); line-height: 1;
    text-shadow: 0 2px 20px rgba(0,200,255,0.15);
  }
  .rot-label {
    font-size: 11px; letter-spacing: 2px; color: var(--muted); margin-top: 2px;
  }

  /* ── LITERS PER ROTATION SETTING ── */
  .lpr-row {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px 14px;
  }
  .lpr-label { font-size: 13px; color: var(--muted); letter-spacing: 1px; }
  .lpr-input-wrap { display: flex; align-items: center; gap: 6px; }
  .lpr-input {
    width: 70px; background: rgba(0,200,255,0.07);
    border: 1px solid var(--border); border-radius: 8px;
    font-family: 'Share Tech Mono', monospace; font-size: 18px;
    color: var(--accent); text-align: center; padding: 4px;
    outline: none;
  }
  .lpr-input:focus { border-color: var(--accent); }
  .lpr-unit { font-size: 12px; color: var(--muted); }

  /* ── TIMER ── */
  .timer-panel {
    background: rgba(13,31,53,0.85);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 14px 16px; backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .timer-info { display: flex; flex-direction: column; gap: 2px; }
  .timer-label { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  .timer-value {
    font-family: 'Share Tech Mono', monospace; font-size: 22px; color: var(--text);
  }
  .timer-btns { display: flex; gap: 8px; }
  .btn-pill {
    padding: 8px 16px; border-radius: 20px;
    border: 1px solid var(--border);
    font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600;
    letter-spacing: 1px; cursor: pointer; transition: all 0.15s;
    background: rgba(0,200,255,0.08); color: var(--accent);
  }
  .btn-pill:active { transform: scale(0.93); }
  .btn-pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .btn-pill.reset { color: var(--warn); border-color: rgba(255,107,53,0.3); background: rgba(255,107,53,0.06); }

  /* ── PULSE ANIMATION ── */
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(0,255,157,0.4); }
    70%  { box-shadow: 0 0 0 14px rgba(0,255,157,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,255,157,0); }
  }
  .pulsing { animation: pulse-ring 1s ease-out; }

  /* ── SCAN LINE ── */
  @keyframes scan {
    0%   { transform: translateY(-100%); opacity: 0.6; }
    50%  { opacity: 0.9; }
    100% { transform: translateY(200%); opacity: 0.6; }
  }
  .scan-line {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    top: 0; animation: scan 2.5s ease-in-out infinite;
    display: none;
  }
  .cam-active .scan-line { display: block; }

  /* ── NOTIFICATION TOAST ── */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--accent2); color: var(--bg);
    font-weight: 700; font-size: 13px; letter-spacing: 1px;
    padding: 10px 20px; border-radius: 20px; opacity: 0;
    transition: all 0.3s; white-space: nowrap; pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted class="hidden"></video>

<div id="app">
  <!-- TOP -->
  <div class="topbar">
    <h1>💧 Счётчик</h1>
    <button class="cam-btn" id="camBtn" onclick="toggleCamera()">📷 Камера</button>
  </div>

  <!-- VIEWFINDER -->
  <div class="viewfinder" id="viewfinder">
    <div class="vf-corners"></div>
    <div class="scan-line" id="scanLine"></div>
    <div class="crosshair" id="crosshair"></div>
    <div class="cam-off-msg" id="camOffMsg">Нажмите «Камера»<br>чтобы включить видео</div>
  </div>

  <!-- READINGS -->
  <div class="digits-row">
    <div class="card">
      <div class="card-label">Литры</div>
      <div class="card-value" id="litersVal">0</div>
      <div class="card-unit">л</div>
    </div>
    <div class="card accent">
      <div class="card-label">Куб.метры</div>
      <div class="card-value" id="m3Val">0.000</div>
      <div class="card-unit">м³</div>
    </div>
    <div class="card warn">
      <div class="card-label">м³ / сутки</div>
      <div class="card-value" id="dailyVal">—</div>
      <div class="card-unit">м³/24ч</div>
    </div>
  </div>

  <!-- COUNTER -->
  <div class="counter-panel">
    <div class="counter-title">Обороты тора</div>
    <div class="counter-main">
      <button class="btn-circle minus" id="minusBtn" onclick="addRotation(-1)">−</button>
      <div class="rotations-display">
        <div class="rot-num" id="rotNum">0</div>
        <div class="rot-label">оборотов</div>
      </div>
      <button class="btn-circle" id="plusBtn" onclick="addRotation(1)">+</button>
    </div>
    <div class="lpr-row">
      <span class="lpr-label">Литров / оборот:</span>
      <div class="lpr-input-wrap">
        <input class="lpr-input" id="lprInput" type="number" value="100" min="1" max="10000" oninput="updateDisplay()">
        <span class="lpr-unit">л</span>
      </div>
    </div>
  </div>

  <!-- TIMER -->
  <div class="timer-panel">
    <div class="timer-info">
      <div class="timer-label">Замер идёт</div>
      <div class="timer-value" id="timerVal">00:00:00</div>
    </div>
    <div class="timer-btns">
      <button class="btn-pill reset" onclick="resetAll()">Сброс</button>
      <button class="btn-pill" id="timerBtn" onclick="toggleTimer()">Старт</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── STATE ──
  let rotations    = 0;
  let timerRunning = false;
  let timerStart   = null;
  let elapsed      = 0;       // ms уже накоплено до паузы
  let timerInterval= null;
  let cameraOn     = false;
  let stream       = null;

  const video      = document.getElementById('video');
  const camBtn     = document.getElementById('camBtn');
  const camOffMsg  = document.getElementById('camOffMsg');
  const crosshair  = document.getElementById('crosshair');
  const viewfinder = document.getElementById('viewfinder');
  const timerBtn   = document.getElementById('timerBtn');
  const toastEl    = document.getElementById('toast');

  // ── CAMERA ──
  async function toggleCamera() {
    if (!cameraOn) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } },
          audio: false
        });
        video.srcObject = stream;
        video.classList.remove('hidden');
        camBtn.classList.add('on');
        camBtn.textContent = '📷 Выкл';
        crosshair.style.display = 'block';
        camOffMsg.style.display = 'none';
        viewfinder.classList.add('cam-active');
        cameraOn = true;
      } catch (e) {
        const isLocal = location.protocol !== 'https:' && location.hostname !== 'localhost';
        if (isLocal) {
          showToast('Камера: нужен HTTPS');
          document.getElementById('camOffMsg').innerHTML =
            '⚠️ Камера требует HTTPS<br><span style="color:#4a7a9b;font-size:11px">Загрузи файл на GitHub Pages<br>или используй счётчик без камеры</span>';
        } else {
          showToast('Нет доступа к камере');
        }
      }
    } else {
      if (stream) stream.getTracks().forEach(t => t.stop());
      video.classList.add('hidden');
      camBtn.classList.remove('on');
      camBtn.textContent = '📷 Камера';
      crosshair.style.display = 'block';
      camOffMsg.style.display = 'block';
      viewfinder.classList.remove('cam-active');
      cameraOn = false;
    }
  }

  // ── ROTATIONS ──
  function addRotation(delta) {
    rotations = Math.max(0, rotations + delta);
    updateDisplay();
    // pulse feedback
    const btn = delta > 0 ? document.getElementById('plusBtn') : document.getElementById('minusBtn');
    btn.classList.remove('pulsing');
    void btn.offsetWidth;
    btn.classList.add('pulsing');
    setTimeout(() => btn.classList.remove('pulsing'), 1000);
  }

  function updateDisplay() {
    const lpr   = parseFloat(document.getElementById('lprInput').value) || 100;
    const liters = rotations * lpr;
    const m3     = liters / 1000;

    document.getElementById('rotNum').textContent    = rotations;
    document.getElementById('litersVal').textContent = liters.toLocaleString('ru');
    document.getElementById('m3Val').textContent     = m3.toFixed(3);

    // м³/сутки — нужно время > 0
    const totalSec = getCurrentElapsed() / 1000;
    if (totalSec > 0 && m3 > 0) {
      const perDay = m3 / totalSec * 86400;
      document.getElementById('dailyVal').textContent = perDay.toFixed(3);
    } else {
      document.getElementById('dailyVal').textContent = '—';
    }
  }

  // ── TIMER ──
  function getCurrentElapsed() {
    if (timerRunning && timerStart !== null) {
      return elapsed + (Date.now() - timerStart);
    }
    return elapsed;
  }

  function toggleTimer() {
    if (!timerRunning) {
      timerStart = Date.now();
      timerRunning = true;
      timerBtn.textContent = 'Пауза';
      timerBtn.classList.add('active');
      timerInterval = setInterval(() => {
        const total = getCurrentElapsed();
        document.getElementById('timerVal').textContent = formatTime(total);
        updateDisplay();
      }, 500);
    } else {
      elapsed += Date.now() - timerStart;
      timerRunning = false;
      clearInterval(timerInterval);
      timerBtn.textContent = 'Старт';
      timerBtn.classList.remove('active');
    }
  }

  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  }

  function resetAll() {
    if (timerRunning) toggleTimer();
    rotations = 0;
    elapsed   = 0;
    document.getElementById('timerVal').textContent = '00:00:00';
    updateDisplay();
    showToast('Данные сброшены');
  }

  // ── TOAST ──
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 2200);
  }

  // ── LONG PRESS + для быстрого счёта ──
  let longPressTimer = null;
  let longPressInterval = null;

  function startLongPress(delta) {
    longPressTimer = setTimeout(() => {
      longPressInterval = setInterval(() => addRotation(delta), 150);
    }, 500);
  }
  function endLongPress() {
    clearTimeout(longPressTimer);
    clearInterval(longPressInterval);
  }

  document.getElementById('plusBtn').addEventListener('pointerdown',  () => startLongPress(1));
  document.getElementById('minusBtn').addEventListener('pointerdown', () => startLongPress(-1));
  ['pointerup','pointerleave','pointercancel'].forEach(ev => {
    document.getElementById('plusBtn').addEventListener(ev,  endLongPress);
    document.getElementById('minusBtn').addEventListener(ev, endLongPress);
  });

  // ── SWIPE VIEWFINDER = +1 оборот ──
  let touchStartX = 0, touchStartY = 0;
  viewfinder.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  viewfinder.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      addRotation(dx > 0 ? 1 : -1);
      showToast(dx > 0 ? '＋1 оборот' : '−1 оборот');
    }
  }, { passive: true });

  // init
  updateDisplay();
</script>
</body>
</html>
